apiVersion: apps/v1
kind: Deployment
metadata:
  name: immverse-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: immverse-app

  template:
    metadata:
      labels:
        app: immverse-app

    spec:
      containers:
      - name: immverse-app
        image: ashuman/immverse-app:6
        ports:
        - containerPort: 3000
